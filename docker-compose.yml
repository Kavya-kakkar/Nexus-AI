version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nexus_ai_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nexus_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: nexus_ai_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/nexus_ai
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-supersecretkey}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/faiss_store:/app/faiss_store
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: nexus_ai_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
